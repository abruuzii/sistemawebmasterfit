<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Recuperar contraseña | Gym</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-md bg-white rounded-2xl shadow p-6">
    <h1 class="text-2xl font-bold mb-2">Recuperar contraseña</h1>
    <p class="text-gray-600 mb-6">Ingresa tu correo y te enviaremos un enlace para restablecer tu contraseña.</p>

    <div id="msg" class="hidden mb-4 rounded-lg p-3 text-sm"></div>

    <form id="formForgot" class="space-y-4">
      <div>
        <label class="block text-sm font-medium mb-1">Correo</label>
        <input id="email" type="email" required
               class="w-full rounded-lg border px-3 py-2 focus:outline-none focus:ring"
               placeholder="tucorreo@gmail.com"/>
      </div>

      <button type="submit"
              class="w-full rounded-lg bg-black text-white py-2 font-medium hover:opacity-90">
        Enviar enlace
      </button>

      <a href="/index.html" class="block text-center text-sm text-gray-600 hover:underline">
        Volver al inicio de sesión
      </a>
    </form>
  </div>

  <script src="/js/config.js"></script>
  <script src="/js/forgot-password.js"></script>
</body>
</html>
