<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Usuarios - Gym</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    /* Igual concepto que Membresías: contenedor con scroll horizontal */
    .table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      width: 100%;
    }

    /* Fuerza overflow real (si no haces esto, el móvil comprime la tabla y NO “obliga” el scroll) */
    .table-wrap table {
      min-width: 980px; /* Ajusta si quieres más ancho */
      width: 100%;
      border-collapse: collapse;
    }

    /* Para que NO se partan palabras y mantenga columnas */
    .table-wrap th,
    .table-wrap td {
      white-space: nowrap;
    }

    /* Barrita gris visible (simulación) */
    .fake-scroll {
      height: 10px;
      background: #e5e7eb;
      border-radius: 9999px;
      overflow: hidden;
      position: relative;
    }
    .fake-scroll > div {
      height: 10px;
      width: 38%;
      background: #9ca3af;
      border-radius: 9999px;
    }
  </style>
</head>

<body class="bg-gray-100 min-h-screen flex">

  <!-- OVERLAY (solo móvil) -->
  <div id="overlay" class="fixed inset-0 bg-black/40 z-40 hidden md:hidden"></div>

  <!-- SIDEBAR -->
  <aside id="sidebar"
    class="w-64 bg-slate-900 text-white
           fixed md:static inset-y-0 left-0 z-50
           transform -translate-x-full md:translate-x-0
           transition-transform duration-300 ease-in-out">

    <div class="p-4 bg-slate-950 text-lg font-bold">
      Sistema GYM
    </div>

    <nav class="px-2 py-4 text-sm space-y-1">
      <a href="dashboard.html" data-module="dashboard" class="block px-3 py-2 rounded hover:bg-slate-700">🏠 Inicio</a>
      
      <button id="clientesToggle" type="button" aria-controls="clientesSubmenu" aria-expanded="false"
        class="w-full flex items-center gap-2 px-3 py-2 rounded hover:bg-slate-700">
        <span data-module="clientes" class="flex-1 flex items-center gap-2">👥 Gestionar Clientes</span>
        <span id="clientesChevron" class="transition-transform duration-200">▾</span>
      </button>

      <div id="clientesSubmenu" class="mt-1 space-y-1 pl-6 hidden">
        <a href="clientes.html" data-module="clientes" class="block px-3 py-2 rounded hover:bg-slate-700">
          Listar/Agregar Clientes
        </a>
        <span class="block px-3 py-2 rounded text-slate-300 cursor-not-allowed opacity-80"
              title="Abre el detalle desde Acciones en la tabla de clientes">
          Detalle de cliente
        </span>
        <a href="clientes_vencimientos.html" data-module="clientes_vencimientos"
          class="block px-3 py-2 rounded hover:bg-slate-700">
          Vencimientos
        </a>
      </div>

      <a href="membresias.html" data-module="membresias" class="block px-3 py-2 rounded hover:bg-slate-700">💳 Membresías</a>

      <a href="usuarios.html" data-module="usuarios" class="block px-3 py-2 rounded bg-blue-600">⚙️ Usuarios</a>
      <a href="reportes.html" data-module="reportes" class="block px-3 py-2 rounded hover:bg-slate-700">📈 Reportes</a>
    </nav>
  </aside>

  <!-- CONTENIDO -->
  <div class="flex-1 flex flex-col">

    <!-- TOPBAR -->
    <nav class="sticky top-0 z-30 bg-white/95 backdrop-blur border-b">
      <div class="w-full flex items-center justify-between px-4 py-3">
        <div class="flex items-center gap-3">
          <button id="menuBtn" class="md:hidden inline-flex items-center justify-center w-10 h-10 rounded hover:bg-gray-100" aria-label="Abrir menú">☰</button>
          <span id="currentUserDisplay" class="text-sm text-gray-700"></span>
        </div>

        <div class="flex items-center">
          <button id="logoutBtn" class="w-auto inline-flex items-center justify-center bg-red-500 hover:bg-red-600 text-white px-4 py-2 md:py-1 rounded text-sm">Cerrar sesión</button>
        </div>
      </div>
    </nav>

    <!-- MAIN -->
    <main class="w-full pt-2">
      <div class="max-w-6xl mx-auto p-4 sm:p-6">

        <!-- Header -->
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between mb-4 gap-3">
          <h1 class="text-2xl font-bold">Administración de Usuarios</h1>

          <div class="w-full sm:w-auto">
            <button type="button"
                    onclick="abrirModalCrear()"
                    class="w-full sm:w-auto bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
              + Nuevo Usuario
            </button>
          </div>
        </div>

        <!-- Buscador -->
        <div class="mb-4">
          <input type="text" id="busqueda"
                 placeholder="Buscar por nombre o email..."
                 class="w-full p-2 border rounded"
                 oninput="filtrarUsuarios()">
        </div>

        <!-- TABLA (mismo patrón que Membresías) -->
<!-- LISTADO -->
<div class="bg-white rounded shadow p-4">
  <div class="flex items-center justify-between mb-3">
    <h2 class="text-lg font-semibold">Listado de usuarios</h2>
  </div>

  <!-- ✅ MÓVIL: CARDS -->
  <div id="usuariosCards" class="grid gap-3 md:hidden"></div>

  <!-- ✅ DESKTOP/TABLET: TABLA -->
  <div class="hidden md:block overflow-x-auto">
    <table class="min-w-full text-sm">
      <thead class="bg-gray-50">
        <tr>
          <th class="px-3 py-2 text-left font-medium text-gray-600">ID</th>
          <th class="px-3 py-2 text-left font-medium text-gray-600">Nombre</th>
          <th class="px-3 py-2 text-left font-medium text-gray-600">Email</th>
          <th class="px-3 py-2 text-left font-medium text-gray-600">Rol</th>
          <th class="px-3 py-2 text-left font-medium text-gray-600">Estado</th>
          <th class="px-3 py-2 text-right font-medium text-gray-600">Acciones</th>
        </tr>
      </thead>
      <tbody id="tablaUsuarios"></tbody>
    </table>
  </div>
</div>


      </div>
    </main>

  </div>

  <!-- Modal Crear/Editar -->
  <div id="modalUsuario"
       class="fixed inset-0 hidden bg-black/40 flex items-center justify-center p-4 z-[60]">
    <div class="bg-white w-full max-w-lg rounded shadow p-6">
      <h2 id="modalTitulo" class="text-xl font-bold mb-4">Nuevo Usuario</h2>

      <input type="hidden" id="usuario_id">

      <div class="mb-3">
        <label class="text-sm font-medium">Nombre</label>
        <input id="nombre" type="text" class="w-full p-2 border rounded"/>
      </div>

      <div class="mb-3">
        <label class="text-sm font-medium">Apellido</label>
        <input id="apellido" type="text" class="w-full p-2 border rounded"/>
      </div>

      <div id="usuarioWrapper" class="mb-3">
        <label class="text-sm font-medium">Usuario</label>
        <input id="usuario" type="text" class="w-full p-2 border rounded"/>
      </div>

      <div class="mb-3">
        <label class="text-sm font-medium">Email</label>
        <input id="email" type="email" class="w-full p-2 border rounded"/>
      </div>

      <div id="passwordWrapper" class="mb-3">
        <label class="text-sm font-medium">
          Password <span id="passwordInfo" class="text-xs text-gray-500"></span>
        </label>
        <div class="relative">
          <input id="password" type="password" class="w-full p-2 pr-10 border rounded"/>
          <button 
            type="button"
            id="togglePasswordBtn"
            class="absolute right-2 top-2.5 text-gray-400 hover:text-gray-600 cursor-pointer"
          >
            <svg id="eyeIconModal" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
        </div>
      </div>

      <div class="mb-4">
        <label class="text-sm font-medium">Rol</label>
        <select id="rol" class="w-full p-2 border rounded">
          <option value="">Seleccione un rol</option>
          <option value="admin">Administrador</option>
          <option value="recepcionista">Recepcionista</option>
          <option value="entrenador">Entrenador</option>
        </select>
      </div>

      <div id="errorBox" class="hidden bg-red-100 text-red-700 p-2 rounded mb-3 text-sm"></div>

      <div class="flex flex-col sm:flex-row justify-end gap-2">
        <button type="button" onclick="cerrarModal()"
                class="w-full sm:w-auto px-4 py-2 bg-gray-400 text-white rounded hover:bg-gray-500">
          Cancelar
        </button>
        <button type="button" onclick="guardarUsuario()"
                class="w-full sm:w-auto px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">
          Guardar
        </button>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/config.js"></script>
  <script src="js/loader.js"></script>
  <script src="js/header.js"></script>
  <script src="js/auth_guard.js"></script>
  <script> guardPage(['admin']); </script>
  <script src="js/usuarios.js"></script>

  <!-- JS menú hamburguesa + submenu -->
  <script>
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    const menuBtn = document.getElementById('menuBtn');

    function openMenu() {
      sidebar.classList.remove('-translate-x-full');
      overlay.classList.remove('hidden');
      document.body.classList.add('overflow-hidden');
    }
    function closeMenu() {
      sidebar.classList.add('-translate-x-full');
      overlay.classList.add('hidden');
      document.body.classList.remove('overflow-hidden');
    }

    menuBtn.addEventListener('click', () => {
      const isClosed = sidebar.classList.contains('-translate-x-full');
      isClosed ? openMenu() : closeMenu();
    });

    overlay.addEventListener('click', closeMenu);

    sidebar.querySelectorAll('a').forEach(a => {
      a.addEventListener('click', () => {
        if (window.innerWidth < 768) closeMenu();
      });
    });

    window.addEventListener('resize', () => {
      if (window.innerWidth >= 768) {
        overlay.classList.add('hidden');
        document.body.classList.remove('overflow-hidden');
        sidebar.classList.remove('-translate-x-full');
      } else {
        sidebar.classList.add('-translate-x-full');
      }
    });

    const clientesToggle = document.getElementById('clientesToggle');
    const clientesSubmenu = document.getElementById('clientesSubmenu');
    const clientesChevron = document.getElementById('clientesChevron');

    if (clientesToggle) {
      clientesToggle.addEventListener('click', () => {
        const isExpanded = clientesToggle.getAttribute('aria-expanded') === 'true';
        clientesToggle.setAttribute('aria-expanded', !isExpanded);
        clientesSubmenu.classList.toggle('hidden');
        clientesChevron.classList.toggle('rotate-180');
      });
    }
  </script>

</body>
</html>
